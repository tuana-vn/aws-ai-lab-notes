AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS AI Platform PoC backend foundation

Globals:
  Function:
    Runtime: python3.12
    Timeout: 10
    MemorySize: 128
    Architectures:
      - x86_64

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    Description: Deployment environment name used to namespace shared resources.
  ApiStageThrottleRateLimit:
    Type: Number
    Default: 10
    Description: Steady-state requests per second for API Gateway stage throttling.
  ApiStageThrottleBurstLimit:
    Type: Number
    Default: 20
    Description: Burst limit for API Gateway stage throttling.

Resources:
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub aws-ai-platform-users-${EnvironmentName}
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: true
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
          TemporaryPasswordValidityDays: 7
      Schema:
        - AttributeDataType: String
          Mutable: true
          Name: project_ids
          StringAttributeConstraints:
            MaxLength: 2048
        - AttributeDataType: String
          Mutable: true
          Name: customer_ids
          StringAttributeConstraints:
            MaxLength: 2048

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub aws-ai-platform-client-${EnvironmentName}
      UserPoolId: !Ref CognitoUserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      PreventUserExistenceErrors: ENABLED
      SupportedIdentityProviders:
        - COGNITO

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: v1
      Name: aws-ai-platform-api
      Auth:
        Authorizers:
          CognitoRagQueryAuthorizer:
            UserPoolArn: !GetAtt CognitoUserPool.Arn
            Identity:
              Header: Authorization
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          ThrottlingRateLimit: !Ref ApiStageThrottleRateLimit
          ThrottlingBurstLimit: !Ref ApiStageThrottleBurstLimit

  AiPlatformRequestTrace:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai-platform-request-trace-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH

  DocumentChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai-platform-document-chunks-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: chunk_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
        - AttributeName: chunk_id
          KeyType: RANGE

  ActionApprovalsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai-platform-action-approvals-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: approval_id
          AttributeType: S
      KeySchema:
        - AttributeName: approval_id
          KeyType: HASH

  IncidentReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ai-platform-incident-reports-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: report_id
          AttributeType: S
      KeySchema:
        - AttributeName: report_id
          KeyType: HASH

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: health.handler.lambda_handler
      Description: Health endpoint for the AWS AI Platform PoC.
      Events:
        GetHealth:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /health
            Method: get

  EchoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: echo.handler.lambda_handler
      Description: Echo endpoint with request trace persistence.
      Environment:
        Variables:
          TRACE_TABLE_NAME: !Ref AiPlatformRequestTrace
      Policies:
        # Least privilege matters here: the Lambda can only write traces to its own table.
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AiPlatformRequestTrace.Arn
      Events:
        PostEcho:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /echo
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: chat.handler.lambda_handler
      Description: Minimal Bedrock chat inference endpoint.
      Environment:
        Variables:
          TRACE_TABLE_NAME: !Ref AiPlatformRequestTrace
          BEDROCK_MODEL_ID: apac.amazon.nova-lite-v1:0
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AiPlatformRequestTrace.Arn
            # This PoC uses a wildcard Bedrock resource to keep setup simple.
            # In production, restrict this to the specific approved model ARN.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource: "*"
      Events:
        PostChat:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chat
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: documents.handler.lambda_handler
      Description: Document indexing endpoint for the mini RAG learning flow.
      Environment:
        Variables:
          DOCUMENT_CHUNKS_TABLE_NAME: !Ref DocumentChunksTable
          EMBEDDING_MODEL_ID: cohere.embed-english-v3
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource: !GetAtt DocumentChunksTable.Arn
            # This PoC uses a wildcard Bedrock resource to keep setup simple.
            # In production, restrict this to the specific approved model or profile ARN.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        PostDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /documents
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  RagQueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: rag_query.handler.lambda_handler
      Description: Embedding retrieval plus grounded Bedrock answer for the mini RAG PoC.
      Environment:
        Variables:
          DOCUMENT_CHUNKS_TABLE_NAME: !Ref DocumentChunksTable
          TRACE_TABLE_NAME: !Ref AiPlatformRequestTrace
          BEDROCK_MODEL_ID: apac.amazon.nova-lite-v1:0
          EMBEDDING_MODEL_ID: cohere.embed-english-v3
          MIN_SIMILARITY_SCORE: "0.25"
      Policies:
        - Version: '2012-10-17'
          Statement:
            # DynamoDB Scan plus in-Lambda cosine similarity is acceptable only for this learning PoC.
            # In production, retrieval should use a proper vector store, filtering, or Bedrock Knowledge Bases.
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt DocumentChunksTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt AiPlatformRequestTrace.Arn
            # This PoC uses a wildcard Bedrock resource to keep setup simple.
            # In production, restrict this to the specific approved model or profile ARN.
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource: "*"
      Events:
        PostRagQuery:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /rag/query
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  AgentRunFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: agent_run.handler.lambda_handler
      Description: Read-only agent entrypoint that orchestrates allowlisted inspection tools.
      Environment:
        Variables:
          DOCUMENT_CHUNKS_TABLE_NAME: !Ref DocumentChunksTable
          TRACE_TABLE_NAME: !Ref AiPlatformRequestTrace
          ACTION_APPROVALS_TABLE_NAME: !Ref ActionApprovalsTable
          BEDROCK_MODEL_ID: apac.amazon.nova-lite-v1:0
          EMBEDDING_MODEL_ID: cohere.embed-english-v3
          MIN_SIMILARITY_SCORE: "0.25"
          RAG_QUERY_LOG_GROUP_NAME: !Sub "/aws/lambda/${RagQueryFunction}"
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:Scan
              Resource: !GetAtt DocumentChunksTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
              Resource: !GetAtt AiPlatformRequestTrace.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt ActionApprovalsTable.Arn
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
                - bedrock:Converse
              Resource: "*"
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
              Resource: "*"
      Events:
        PostAgentRun:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /agent/run
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  ApprovalsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: approvals.handler.lambda_handler
      Description: Approval lookup and decision recording endpoint for proposed agent actions.
      Environment:
        Variables:
          ACTION_APPROVALS_TABLE_NAME: !Ref ActionApprovalsTable
          INCIDENT_REPORTS_TABLE_NAME: !Ref IncidentReportsTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt ActionApprovalsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource: !GetAtt IncidentReportsTable.Arn
      Events:
        GetApproval:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /approvals/{approvalId}
            Method: get
            Auth:
              Authorizer: CognitoRagQueryAuthorizer
        PostApprovalDecision:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /approvals/{approvalId}/decision
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer
        PostApprovalExecute:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /approvals/{approvalId}/execute
            Method: post
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  IncidentReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../backend/lambda
      Handler: incident_reports.handler.lambda_handler
      Description: Incident report lookup endpoint for internally executed approved actions.
      Environment:
        Variables:
          INCIDENT_REPORTS_TABLE_NAME: !Ref IncidentReportsTable
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !GetAtt IncidentReportsTable.Arn
      Events:
        GetIncidentReport:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /incident-reports/{reportId}
            Method: get
            Auth:
              Authorizer: CognitoRagQueryAuthorizer

  AiPlatformOperationalDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub aws-ai-platform-operations-${EnvironmentName}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "text",
              "x": 0,
              "y": 0,
              "width": 24,
              "height": 3,
              "properties": {
                "markdown": "# AWS AI Platform PoC Operations\nThis Phase 9C dashboard is a low-risk PoC operational view built from current CloudWatch Logs. DynamoDB traces, approval records, and incident report records remain companion evidence and are not native dashboard widget sources."
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 3,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${RagQueryFunction}'\n| fields @timestamp, request_id, requestId, status, eventType, question, source_count, sourceCount, eligible_chunk_count, eligibleChunkCount\n| filter status = \"no_source\" or eventType = \"rag_no_source\"\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "RAG No-Source Events",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 8,
              "y": 3,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${RagQueryFunction}'\n| fields @timestamp, request_id, requestId, status, eventType, guardrail_action, guardrailAction, guardrail_reason, guardrailReason, guardrail_matched_rule, guardrailMatchedRule\n| filter status = \"blocked\" or eventType = \"input_guardrail_blocked\" or guardrail_action = \"block\" or guardrailAction = \"block\"\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "RAG Guardrail Blocks",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16,
              "y": 3,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${RagQueryFunction}'\n| fields @timestamp, request_id, requestId, path, user_id, userId, status, eventType, @message\n| filter status = \"denied\" or eventType = \"policy_denied\" or @message like /denied|policy/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "RAG Policy Denied Events",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 9,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${AgentRunFunction}'\n| fields @timestamp, request_id, requestId, task, tool_calls, toolCalls, status, eventType, @message\n| filter ispresent(tool_calls) or ispresent(toolCalls) or eventType = \"agent_tool_called\" or eventType = \"agent_tool_failed\" or @message like /tool_calls|toolCalls|trace_lookup|log_search|rag_query/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Agent Tool Execution",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 8,
              "y": 9,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${ApprovalsFunction}'\n| fields @timestamp, approval_id, approvalId, decision, execution_status, executionStatus, user_id, userId, status, eventType, @message\n| filter eventType = \"approval_decided\" or ispresent(approval_id) or ispresent(approvalId) or @message like /approval|decision|approved|rejected/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Approval Decisions",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 16,
              "y": 9,
              "width": 8,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${ApprovalsFunction}'\n| fields @timestamp, approval_id, approvalId, report_id, reportId, execution_status, executionStatus, action_type, actionType, user_id, userId, status, eventType, @message\n| filter eventType = \"approval_execute_requested\" or eventType = \"approval_execute_denied\" or eventType = \"approval_executed\" or ispresent(report_id) or ispresent(reportId) or @message like /execute|executed|reportId|report_id|incident report/\n| sort @timestamp desc\n| limit 20",
                "region": "${AWS::Region}",
                "title": "Approval Executions",
                "view": "table"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 15,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${ApprovalsFunction}'\n| fields @timestamp, request_id, requestId, path, status, eventType, guardrail_action, guardrailAction, user_id, userId, approval_id, approvalId, report_id, reportId, @message\n| filter status = \"denied\" or status = \"failed\" or eventType = \"approval_decided\" or eventType = \"approval_execute_denied\" or eventType = \"approval_executed\" or eventType = \"incident_report_created\" or eventType = \"error\" or @message like /approval|execute|incident report/\n| sort @timestamp desc\n| limit 50",
                "region": "${AWS::Region}",
                "title": "Approval Security Audit Events",
                "view": "table"
              }
            }
          ]
        }

Outputs:
  ApiBaseUrl:
    Description: Base invoke URL for the deployed API stage.
    Value: !Sub https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/v1

  OperationalDashboardName:
    Description: CloudWatch dashboard name for the Phase 9C operational view.
    Value: !Ref AiPlatformOperationalDashboard

  ApiStageThrottleRateLimit:
    Description: Configured API Gateway steady-state throttling rate limit.
    Value: !Ref ApiStageThrottleRateLimit

  ApiStageThrottleBurstLimit:
    Description: Configured API Gateway burst throttling limit.
    Value: !Ref ApiStageThrottleBurstLimit

  TraceTableName:
    Description: DynamoDB table storing request traces.
    Value: !Ref AiPlatformRequestTrace

  DocumentChunksTableName:
    Description: DynamoDB table storing indexed document chunks.
    Value: !Ref DocumentChunksTable

  ActionApprovalsTableName:
    Description: DynamoDB table storing approval workflow records.
    Value: !Ref ActionApprovalsTable

  IncidentReportsTableName:
    Description: DynamoDB table storing internally executed incident report records.
    Value: !Ref IncidentReportsTable

  CognitoUserPoolId:
    Description: Cognito User Pool ID for the first protected route rollout.
    Value: !Ref CognitoUserPool

  CognitoUserPoolClientId:
    Description: Cognito User Pool Client ID for test user authentication.
    Value: !Ref CognitoUserPoolClient

  CognitoUserPoolArn:
    Description: Cognito User Pool ARN used by the API Gateway authorizer.
    Value: !GetAtt CognitoUserPool.Arn
